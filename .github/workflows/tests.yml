name: Tests

on:
  push:
    branches: [develop, improvements]
  pull_request:
    branches: [develop, improvements]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Note: macos-13 is being retired Dec 4, 2025; remove it before then.
        os: [macos-13, macos-14, macos-15]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install bats-core shellcheck

      - name: Run tests and linting
        run: make check
