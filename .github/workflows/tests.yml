name: Tests

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-26]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install bats-core shellcheck

      - name: Run tests and linting
        run: make check
